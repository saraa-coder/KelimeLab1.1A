<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelime Lab - Aprende Turco</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="start-screen" class="screen-content">
        <div class="header-container">
            
            <h1 class="main-title">
                Kelime Lab
            </h1>

            <div class="version-badge">
                1.1A
            </div>
        </div>
        
        <button id="start-button" onclick="resetAndStart()" class="primary-btn btn-blue">
            BAŞLA
        </button>
        
        <button id="resume-button" onclick="startGame()" class="primary-btn btn-blue" style="display: none;">
            DEVAM ET
        </button>
    </div>

    <div id="game-container">
        <div class="topbar">
            <div class="stats">
                <span id="score">0 tamamlanan</span>
                <span id="percent">%0</span>
            </div>
            <button class="stats" onclick="location.reload()">Menü</button>
        </div>
        
        <div class="card">
            <h1 id="word">Cargando...</h1>
            <div id="dots"></div>
        </div>
        
        <div id="options" class="options-grid"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
